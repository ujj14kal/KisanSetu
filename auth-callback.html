<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signing you in | Kisan Setu</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="Home.css">
<link rel="stylesheet" href="auth.css">
<style>
  /* ── Confirm Overlay ── */
  #confirmOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #confirmOverlay.show { display: flex; }

  #confirmBox {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px 32px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .confirm-emoji {
    font-size: 3.5rem;
    margin-bottom: 16px;
    display: block;
    animation: popIn 0.4s ease;
  }

  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  .confirm-role-badge {
    display: inline-block;
    background: linear-gradient(135deg, #e8f5ee, #d0edda);
    color: #1a7a3c;
    border: 1.5px solid #a8d5b5;
    border-radius: 50px;
    padding: 4px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #confirmBox h5 {
    font-size: 1.35rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  #confirmBox p {
    color: #777;
    font-size: 0.93rem;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .confirm-actions {
    display: flex;
    gap: 12px;
  }

  .btn-cancel-confirm {
    flex: 1;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 50px;
    background: #fff;
    color: #555;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel-confirm:hover {
    background: #f5f5f5;
    border-color: #ccc;
  }

  .btn-continue-confirm {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #1a7a3c, #25a355);
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(26, 122, 60, 0.35);
    transition: all 0.2s;
  }
  .btn-continue-confirm:hover {
    background: linear-gradient(135deg, #155f30, #1e8a47);
    box-shadow: 0 6px 18px rgba(26, 122, 60, 0.45);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<section class="auth-section auth-bg d-flex align-items-center justify-content-center">
  <div class="auth-card text-center">
    <h4 class="fw-bold mb-2">Signing you in…</h4>
    <p class="text-muted mb-3">Please wait while we verify your account</p>
    <div class="spinner-border text-success"></div>
  </div>
</section>

<!-- ── CONFIRM PROMPT ── -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <span class="confirm-emoji" id="confirmEmoji">🌾</span>
    <div class="confirm-role-badge" id="confirmBadge">Farmer</div>
    <h5 id="confirmTitle">Creating a Farmer Account?</h5>
    <p id="confirmDesc">
      You're about to complete your <strong>Farmer</strong> profile.<br>
      Please confirm to continue or go back to home.
    </p>
    <div class="confirm-actions">
      <button class="btn-cancel-confirm" onclick="cancelConfirm()">← Cancel</button>
      <button class="btn-continue-confirm" onclick="continueConfirm()">Continue →</button>
    </div>
  </div>
</div>

<!-- ROLE SELECTION MODAL — fallback only if no role hint available -->
<div class="modal fade" id="roleModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 p-3">
      <div class="modal-body text-center">
        <h4 class="fw-bold mb-2">Welcome to Kisan Setu 🌾</h4>
        <p class="text-muted mb-4">Tell us who you are to continue</p>
        <button class="btn btn-success w-100 mb-3" onclick="askConfirm('farmer')">I am a Farmer</button>
        <button class="btn btn-outline-success w-100" onclick="askConfirm('worker')">I am a Landlord</button>
      </div>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "https://kyujketzdhkbykybjywu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5dWprZXR6ZGhrYnlreWJqeXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3ODAwNjcsImV4cCI6MjA4MzM1NjA2N30.CRXq5CtQ6WIkBeQA-52YUYiTc3GXxJ9Gt4X05D40VQA"
  );

  // ✅ Read role hint from localStorage (set before OAuth redirect)
  const roleHint = localStorage.getItem("ks_role_hint"); // "farmer" | "worker" | null

  let pendingRole = null;

  async function handleAuth() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      const { error } = await supabaseClient.auth.exchangeCodeForSession(window.location.href);
      if (error) {
        alert("Login failed: " + error.message);
        return;
      }
    }

    const { data } = await supabaseClient.auth.getSession();
    if (data.session?.user) {
      await redirectByRole(data.session.user);
    }
  }

  async function redirectByRole(user) {
    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("role, onboarding_completed")
      .eq("id", user.id)
      .maybeSingle();

    // ── No profile row yet (brand new Google user) ──────────────────
    if (!profile) {
      if (roleHint) {
        askConfirm(roleHint);
      } else {
        showRoleModal();
      }
      return;
    }

    // ── Profile exists but onboarding not finished ───────────────────
    if (!profile.onboarding_completed) {
      askConfirm(profile.role);
      return;
    }

    // ── Fully onboarded → dashboard (clear any leftover hint) ────────
    localStorage.removeItem("ks_role_hint");
    if (profile.role === "farmer") {
      window.location.replace("profile-farmer.html");
    } else {
      window.location.replace("profile-worker.html");
    }
  }

  function askConfirm(role) {
    pendingRole = role;
    const isFarmer = role === "farmer";

    document.getElementById("confirmEmoji").textContent = isFarmer ? "🌾" : "🏡";
    document.getElementById("confirmBadge").textContent = isFarmer ? "Farmer" : "Landlord";
    document.getElementById("confirmTitle").textContent = isFarmer
      ? "Creating a Farmer Account?"
      : "Creating a Landlord Account?";
    document.getElementById("confirmDesc").innerHTML = isFarmer
      ? `You're about to complete your <strong>Farmer</strong> profile.<br>Please confirm to continue or go back to home.`
      : `You're about to complete your <strong>Landlord</strong> profile.<br>Please confirm to continue or go back to home.`;

    document.getElementById("confirmOverlay").classList.add("show");
  }

  function continueConfirm() {
    document.getElementById("confirmOverlay").classList.remove("show");
    // ✅ Clear the hint now that we've used it
    localStorage.removeItem("ks_role_hint");
    goToCompleteProfile(pendingRole);
  }

  function cancelConfirm() {
    document.getElementById("confirmOverlay").classList.remove("show");
    // ✅ Clear hint on cancel too so it doesn't persist
    localStorage.removeItem("ks_role_hint");
    window.location.replace("index.html");
  }

  function goToCompleteProfile(role) {
    if (role === "farmer") {
      window.location.replace("create-account-farmer.html?source=google");
    } else {
      window.location.replace("create-account-worker.html?source=google");
    }
  }

  function showRoleModal() {
    const modal = new bootstrap.Modal(document.getElementById("roleModal"));
    modal.show();
  }

  handleAuth();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
