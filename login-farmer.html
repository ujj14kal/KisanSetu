<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Login | Kisan Setu</title>
  <meta name="description" content="Login to Kisan Setu as a farmer to find verified farming jobs from trusted landlords.">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='90'%3E%F0%9F%8C%BE%3C/text%3E%3C/svg%3E">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="Home.css">
  <link rel="stylesheet" href="auth.css">
  <style>.auth-section{padding:52px 0 60px;}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top ks-nav">
  <div class="container">
    <a class="navbar-brand ks-brand" href="index.html">🌾 Kisan Setu</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link ks-nav-link" href="login-worker.html">Landlord Login</a>
      </li>
    </ul>
  </div>
</nav>

<section class="auth-section auth-bg">
  <div class="container d-flex justify-content-center">
    <div class="auth-card text-center">

      <div style="font-size:2.2rem;margin-bottom:8px;">🌾</div>
      <h2 class="auth-title fw-bold mb-1">Farmer Login</h2>
      <p class="auth-subtitle mb-4">Find verified farming jobs from trusted employers.</p>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold" style="font-size:0.85rem;color:#555;">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username" autocomplete="username" required />
      </div>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold" style="font-size:0.85rem;color:#555;">Password</label>
        <div class="ks-input-wrap">
          <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
      </div>

      <button id="loginBtn" class="btn btn-success w-100 mb-3" onclick="loginWithUsername()">Login</button>

      <div class="text-muted my-3" style="position:relative;font-size:0.85rem;">
        <hr style="margin:0;border-color:#e0e0e0;">
        <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:0 12px;">OR</span>
      </div>

      <button id="googleBtn" onclick="loginWithGoogle()" class="google-btn w-100 mb-3">
        <img src="Assets/Images/google_logo_no_bg.png" alt="Google" class="google-icon" />
        <span>Continue with Google</span>
      </button>

      <p class="auth-footer-text mt-3">
        Don't have an account?
        <a href="create-account-farmer.html" class="fw-semibold">Create Farmer Account</a>
      </p>

    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-content">
    <p class="footer-text">© 2026 Kisan Setu. All rights reserved.</p>
    <p class="footer-brand">🌾 <strong>Kisan Setu</strong></p>
  </div>
</footer>

<script src="ks-utils.js"></script>
<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "https://kyujketzdhkbykybjywu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5dWprZXR6ZGhrYnlreWJqeXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3ODAwNjcsImV4cCI6MjA4MzM1NjA2N30.CRXq5CtQ6WIkBeQA-52YUYiTc3GXxJ9Gt4X05D40VQA"
  );

  window.addEventListener("DOMContentLoaded", () => {
    ksAddPasswordToggle("password");
  });

  async function loginWithGoogle() {
    const btn = document.getElementById("googleBtn");
    ksSetBtnLoading(btn, "Redirecting…");
    localStorage.setItem("ks_role_hint", "farmer");
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + "/auth-callback.html" }
    });
    if (error) {
      showToast(error.message, "error");
      ksResetBtn(btn);
    }
  }

  async function loginWithUsername() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    if (!username || !password) {
      showToast("Please enter your username and password.", "warning");
      return;
    }

    ksSetBtnLoading(btn, "Logging in…");

    const response = await fetch(
      "https://kyujketzdhkbykybjywu.supabase.co/functions/v1/login-with-username",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": supabaseClient.supabaseKey,
          "Authorization": `Bearer ${supabaseClient.supabaseKey}`
        },
        body: JSON.stringify({ username, password, expectedRole: "farmer" })
      }
    );

    const result = await response.json();

    if (!response.ok) {
      showToast(result.error || "Login failed. Please check your credentials.", "error");
      ksResetBtn(btn);
      return;
    }

    await supabaseClient.auth.setSession(result.session);
    window.location.href = "/auth-callback.html";
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
