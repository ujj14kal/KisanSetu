<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.gstatic.com checkout.razorpay.com api.razorpay.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; img-src 'self' data: blob: *.supabase.co lh3.googleusercontent.com; connect-src 'self' *.supabase.co securetoken.googleapis.com identitytoolkit.googleapis.com www.googleapis.com api.razorpay.com; font-src 'self' cdn.jsdelivr.net fonts.gstatic.com; frame-src api.razorpay.com accounts.google.com; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Farmers | Kisan Setu</title>
  <meta name="description" content="Find verified farmers near you on Kisan Setu. Search by location and send hiring requests.">

  <link rel="icon" href="Assets/Images/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <link rel="stylesheet" href="Home.css">
  <link rel="stylesheet" href="auth.css">

  <style>
    .farmer-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      border: 1.5px solid #f0f0f0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .farmer-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(46,125,50,0.12); }
    .farmer-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .farmer-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Baloo 2', cursive; font-weight: 800;
      font-size: 1.1rem; color: #fff; flex-shrink: 0;
    }
    .farmer-name { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 1rem; color: #2f2f2f; margin: 0; }
    .farmer-location { font-size: 0.82rem; color: #888; margin: 2px 0 0; }
    .farmer-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .farmer-tag {
      background: #f4f8f3; border: 1px solid #d4e9d6;
      border-radius: 8px; padding: 4px 10px;
      font-size: 0.78rem; font-weight: 600; color: #2e7d32;
    }
    .search-empty {
      text-align: center; padding: 40px 20px; color: #aaa;
    }
    .search-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
    .search-empty p { font-size: 0.95rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" href="index.html">🌾 Kisan Setu</a>
    <button class="btn btn-outline-success btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<section class="auth-section auth-bg">
  <div class="container">
    <div class="auth-card" style="max-width:560px;">

      <h4 class="fw-bold text-center mb-1">Find Farmers</h4>
      <p class="text-muted text-center mb-4" style="font-size:0.88rem;">Search by location and skill to find verified farmers near you</p>

      <div class="input-group mb-2" style="border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
        <input type="text" id="locationInput" class="form-control" placeholder="Enter location (e.g. Delhi, Punjab…)"
          onkeydown="if(event.key==='Enter') searchFarmers()">
        <button class="btn btn-success px-4" id="searchBtn" onclick="searchFarmers()">Search</button>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-6">
          <select class="form-select form-select-sm" id="skillFilter" style="border-radius:10px;">
            <option value="">All skills</option>
            <option value="Crop Farming">Crop Farming</option>
            <option value="Dairy">Dairy</option>
            <option value="Mixed Farming">Mixed Farming</option>
            <option value="Horticulture">Horticulture</option>
            <option value="Irrigation">Irrigation</option>
            <option value="Harvesting">Harvesting</option>
            <option value="Ploughing">Ploughing</option>
          </select>
        </div>
        <div class="col-6">
          <select class="form-select form-select-sm" id="availabilityFilter" style="border-radius:10px;">
            <option value="">Any availability</option>
            <option value="Immediate">Immediate</option>
            <option value="Within 1 week">Within 1 week</option>
            <option value="Within 1 month">Within 1 month</option>
            <option value="Seasonal">Seasonal</option>
          </select>
        </div>
      </div>

      <div id="subscriptionWarning" class="alert d-none mb-3" style="background:#fff8e1;border:1.5px solid #ffe082;border-radius:12px;font-size:0.88rem;">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <span>⚠️ <strong>Subscribe</strong> to send hiring requests to farmers.</span>
          <button class="btn btn-sm btn-success" onclick="handlePayment()">Pay ₹49 / month</button>
        </div>
      </div>

      <div id="results">
        <div class="search-empty">
          <span class="empty-icon">🔍</span>
          <p>Enter a location above to find farmers in your area.</p>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="ks-utils.js"></script>
<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "https://kyujketzdhkbykybjywu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5dWprZXR6ZGhrYnlreWJqeXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3ODAwNjcsImV4cCI6MjA4MzM1NjA2N30.CRXq5CtQ6WIkBeQA-52YUYiTc3GXxJ9Gt4X05D40VQA"
  );

  let isSubscribed = false;
  let sessionUser = null;
  // Map of farmerId -> latest job { status, cooldown_until }
  let existingRequests = {};

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return location.replace("index.html");

    sessionUser = session.user;

    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("role, subscription_active")
      .eq("id", session.user.id)
      .single();

    if (!profile || profile.role !== "worker") {
      location.replace("index.html");
      return;
    }

    isSubscribed = profile.subscription_active;

    document.getElementById("subscriptionWarning")
      .classList.toggle("d-none", isSubscribed);

    // Load all existing requests for this worker so we can check duplicates
    await loadExistingRequests();
  }

  async function loadExistingRequests() {
    const { data } = await supabaseClient
      .from("jobs")
      .select("farmer_id, status, cooldown_until, created_at")
      .eq("worker_id", sessionUser.id)
      .order("created_at", { ascending: false });

    if (!data) return;

    // Keep only the latest request per farmer
    existingRequests = {};
    data.forEach(job => {
      if (!existingRequests[job.farmer_id]) {
        existingRequests[job.farmer_id] = job;
      }
    });
  }

  async function searchFarmers() {
    const locationStr = document.getElementById("locationInput").value.trim();
    const skillFilter = document.getElementById("skillFilter").value;
    const availabilityFilter = document.getElementById("availabilityFilter").value;
    const results = document.getElementById("results");

    if (!locationStr) { showToast("Please enter a location to search.", "warning"); return; }

    const searchBtn = document.getElementById("searchBtn");
    ksSetBtnLoading(searchBtn, "Searching…");

    results.innerHTML = `
      <div class="text-center my-4">
        <div class="spinner-border text-success"></div>
        <p class="text-muted mt-2" style="font-size:0.85rem;">Finding farmers in ${locationStr}…</p>
      </div>`;

    let query = supabaseClient
      .from("profiles")
      .select(`id, full_name, location, skill, availability, aadhar_verified`)
      .eq("role", "farmer")
      .ilike("location", `%${locationStr}%`);

    if (skillFilter) query = query.ilike("skill", `%${skillFilter}%`);
    if (availabilityFilter) query = query.eq("availability", availabilityFilter);
    query = query.range(0, 49);

    const { data: farmers, error } = await query;

    ksResetBtn(searchBtn);
    results.innerHTML = "";

    if (error || !farmers || !farmers.length) {
      const empty = document.createElement("div");
      empty.className = "search-empty";
      empty.innerHTML = `<span class="empty-icon">🌾</span>`;
      const p = document.createElement("p");
      p.textContent = `No farmers found in ${locationStr}. Try a nearby city or district name.`;
      empty.appendChild(p);
      results.appendChild(empty);
      return;
    }

    const summary = document.createElement("p");
    summary.className = "text-muted mb-3";
    summary.style.fontSize = "0.82rem";
    summary.innerHTML = `Found <strong>${farmers.length}</strong> farmer${farmers.length !== 1 ? "s" : ""} near `;
    const locSpan = document.createElement("strong");
    locSpan.textContent = locationStr;
    summary.appendChild(locSpan);
    results.appendChild(summary);

    farmers.forEach(f => {
      const existing = existingRequests[f.id];
      const initials = f.full_name?.split(" ").map(w => w[0]).join("").substring(0,2).toUpperCase() || "?";

      const card = document.createElement("div");
      card.className = "farmer-card";

      // Header
      const header = document.createElement("div");
      header.className = "farmer-card-header";

      const avatar = document.createElement("div");
      avatar.className = "farmer-avatar";
      avatar.textContent = initials;
      header.appendChild(avatar);

      const info = document.createElement("div");
      const namePara = document.createElement("p");
      namePara.className = "farmer-name";
      namePara.textContent = f.full_name || "—";
      const locPara = document.createElement("p");
      locPara.className = "farmer-location";
      locPara.textContent = "📍 " + (f.location || "—");
      info.appendChild(namePara);
      info.appendChild(locPara);
      header.appendChild(info);

      const badge = document.createElement("span");
      badge.className = `badge ms-auto ${f.aadhar_verified ? "bg-success" : "bg-warning text-dark"}`;
      badge.style.cssText = "font-size:0.7rem;border-radius:6px;";
      badge.textContent = f.aadhar_verified ? "✓ Aadhaar" : "Pending";
      header.appendChild(badge);
      card.appendChild(header);

      // Tags
      const meta = document.createElement("div");
      meta.className = "farmer-meta";
      if (f.skill) { const t = document.createElement("span"); t.className = "farmer-tag"; t.textContent = "🛠️ " + f.skill; meta.appendChild(t); }
      if (f.availability) { const t = document.createElement("span"); t.className = "farmer-tag"; t.textContent = "📅 " + f.availability; meta.appendChild(t); }
      card.appendChild(meta);

      // Action button
      const btn = document.createElement("button");
      btn.style.borderRadius = "8px";
      btn.className = "w-100 btn btn-sm";

      if (!isSubscribed) {
        btn.className += " btn-outline-secondary";
        btn.disabled = true;
        btn.textContent = "🔒 Subscribe to Send Request";
      } else if (existing) {
        const status = existing.status;
        const inCooldown = existing.cooldown_until && new Date(existing.cooldown_until) > new Date();
        if (status === "pending") {
          btn.className += " btn-warning"; btn.disabled = true; btn.textContent = "⏱ Request Sent — Awaiting Response";
        } else if (status === "accepted") {
          btn.className += " btn-success"; btn.disabled = true; btn.textContent = "✓ Request Accepted";
        } else if (status === "declined" && inCooldown) {
          btn.className += " btn-outline-danger"; btn.disabled = true;
          btn.textContent = "Declined — retry in ";
          const cdSpan = document.createElement("span");
          cdSpan.id = `cd-${f.id}`;
          cdSpan.textContent = "...";
          btn.appendChild(cdSpan);
        } else {
          btn.className += " btn-success"; btn.textContent = "Send Hiring Request";
          btn.addEventListener("click", () => hireFarmer(f.id, f.location || ""));
        }
      } else {
        btn.className += " btn-success"; btn.textContent = "Send Hiring Request";
        btn.addEventListener("click", () => hireFarmer(f.id, f.location || ""));
      }
      card.appendChild(btn);
      results.appendChild(card);
    });

    // Start countdowns for declined + in-cooldown farmers
    farmers.forEach(f => {
      const existing = existingRequests[f.id];
      if (existing?.status === "declined" && existing.cooldown_until) {
        const cooldown = new Date(existing.cooldown_until);
        if (cooldown > new Date()) startCountdown(`cd-${f.id}`, existing.cooldown_until);
      }
    });
  }

  function startCountdown(elementId, cooldownUntil) {
    const el = document.getElementById(elementId);
    if (!el) return;

    const target = new Date(cooldownUntil).getTime();

    const interval = setInterval(() => {
      const diff = target - Date.now();
      if (diff <= 0) {
        clearInterval(interval);
        el.closest("button").outerHTML = `
          <button class="btn btn-success w-100" onclick="location.reload()">
            Cooldown over — Refresh to send request
          </button>`;
        return;
      }
      const h = Math.floor(diff / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      el.innerText = `${h}h ${m}m ${s}s`;
    }, 1000);
  }

  async function hireFarmer(farmerId, farmerLocation) {
    // Double-check on submit to prevent race conditions
    await loadExistingRequests();
    const existing = existingRequests[farmerId];

    if (existing) {
      const status = existing.status;
      const cooldown = existing.cooldown_until ? new Date(existing.cooldown_until) : null;
      const inCooldown = cooldown && cooldown > new Date();

      if (status === "pending") {
        showToast("You've already sent a request to this farmer.", "warning");
        return;
      }
      if (status === "accepted") {
        showToast("This farmer has already accepted your request.", "info");
        return;
      }
      if (status === "declined" && inCooldown) {
        showToast("Please wait for the cooldown period to end before sending another request.", "warning");
        return;
      }
    }

    const { error } = await supabaseClient
      .from("jobs")
      .insert([{
        worker_id: sessionUser.id,
        farmer_id: farmerId,
        status: "pending",
        location: farmerLocation || "N/A"
      }]);

    if (error) {
      showToast(error.message, "error");
    } else {
      showToast("Hiring request sent successfully!", "success");
      setTimeout(() => location.href = "profile-worker.html", 1500);
    }
  }

  // Subscription handling with Razorpay
async function handlePayment() {
  if (!sessionUser) { showToast("Session not found. Please log in again.", "error"); return; }

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { showToast("Session expired. Please log in again.", "error"); return; }

    const res = await fetch(
      "https://kyujketzdhkbykybjywu.supabase.co/functions/v1/create-subscription",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ user_id: sessionUser.id, user_email: sessionUser.email }),
      }
    );

    const { subscription_id, error } = await res.json();
    if (error || !subscription_id) {
      showToast("Could not create subscription: " + (error || "unknown error"), "error");
      return;
    }

    const options = {
      key: "rzp_test_STZ6trtojWVF57",
      subscription_id: subscription_id,
      name: "Kisan Setu",
      description: "Landlord Subscription — ₹49/month",
      prefill: { email: sessionUser.email },
      handler: async function (response) {
        const { data: { session: freshSession } } = await supabaseClient.auth.getSession();
        const verifyRes = await fetch(
          "https://kyujketzdhkbykybjywu.supabase.co/functions/v1/verify-payment",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${freshSession.access_token}`,
            },
            body: JSON.stringify({
              payment_id: response.razorpay_payment_id,
              subscription_id: response.razorpay_subscription_id,
              signature: response.razorpay_signature,
            }),
          }
        );
        const result = await verifyRes.json();
        if (!verifyRes.ok || !result.success) {
          showToast("Payment verification failed. Please contact support.", "error");
          return;
        }
        showToast("Subscription activated! Refreshing…", "success");
        setTimeout(() => location.reload(), 1800);
      },
      theme: { color: "#2e7d32" },
    };
    new Razorpay(options).open();

  } catch (err) {
    showToast("Something went wrong: " + err.message, "error");
  }
}

  async function logout() {
    await supabaseClient.auth.signOut();
    location.replace("index.html");
  }

  init();
</script>

<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
