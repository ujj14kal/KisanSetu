<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net www.gstatic.com checkout.razorpay.com api.razorpay.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; img-src 'self' data: blob: *.supabase.co lh3.googleusercontent.com; connect-src 'self' *.supabase.co securetoken.googleapis.com identitytoolkit.googleapis.com www.googleapis.com api.razorpay.com; font-src 'self' cdn.jsdelivr.net fonts.gstatic.com; frame-src api.razorpay.com accounts.google.com; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Kisan Setu</title>
  <meta name="description" content="Reset your Kisan Setu account password.">
  <link rel="icon" href="Assets/Images/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="Home.css">
  <link rel="stylesheet" href="auth.css">
  <style>.auth-section { padding: 52px 0 60px; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top ks-nav">
  <div class="container">
    <a class="navbar-brand ks-brand" href="index.html">🌾 Kisan Setu</a>
  </div>
</nav>

<!-- REQUEST STEP: shown by default -->
<section class="auth-section auth-bg" id="requestStep">
  <div class="container d-flex justify-content-center">
    <div class="auth-card text-center">
      <div style="font-size:2.2rem;margin-bottom:8px;">🔑</div>
      <h2 class="auth-title fw-bold mb-1">Forgot Password?</h2>
      <p class="auth-subtitle mb-4">Enter your email and we'll send you a reset link.</p>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold" style="font-size:0.85rem;color:#555;">Email Address</label>
        <input type="email" class="form-control" id="resetEmail" placeholder="you@example.com" autocomplete="email" />
      </div>

      <button id="sendBtn" class="btn btn-success w-100 mb-3" onclick="sendResetEmail()">Send Reset Link</button>

      <p class="auth-footer-text mt-2">
        <a href="login-farmer.html" class="text-muted" style="font-size:0.85rem;">← Back to login</a>
      </p>
    </div>
  </div>
</section>

<!-- SET NEW PASSWORD STEP: shown after clicking email link -->
<section class="auth-section auth-bg d-none" id="newPasswordStep">
  <div class="container d-flex justify-content-center">
    <div class="auth-card text-center">
      <div style="font-size:2.2rem;margin-bottom:8px;">🔒</div>
      <h2 class="auth-title fw-bold mb-1">Set New Password</h2>
      <p class="auth-subtitle mb-4">Choose a strong password for your account.</p>

      <div class="mb-3 text-start">
        <label class="form-label fw-semibold" style="font-size:0.85rem;color:#555;">New Password</label>
        <input type="password" class="form-control" id="newPassword" placeholder="At least 6 characters" minlength="6" />
      </div>

      <div class="mb-4 text-start">
        <label class="form-label fw-semibold" style="font-size:0.85rem;color:#555;">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your password" />
      </div>

      <button id="updateBtn" class="btn btn-success w-100" onclick="updatePassword()">Update Password</button>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-content">
    <p class="footer-text">© 2026 Kisan Setu. All rights reserved.</p>
    <p class="footer-brand">🌾 <strong>Kisan Setu</strong></p>
  </div>
</footer>

<script src="ks-utils.js"></script>
<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "https://kyujketzdhkbykybjywu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt5dWprZXR6ZGhrYnlreWJqeXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3ODAwNjcsImV4cCI6MjA4MzM1NjA2N30.CRXq5CtQ6WIkBeQA-52YUYiTc3GXxJ9Gt4X05D40VQA"
  );

  // If Supabase redirected here with a recovery token, switch to new-password step
  supabaseClient.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") {
      document.getElementById("requestStep").classList.add("d-none");
      document.getElementById("newPasswordStep").classList.remove("d-none");
    }
  });

  async function sendResetEmail() {
    const email = document.getElementById("resetEmail").value.trim();
    const btn = document.getElementById("sendBtn");

    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      showToast("Please enter a valid email address.", "warning");
      return;
    }

    ksSetBtnLoading(btn, "Sending…");

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/reset-password.html",
    });

    ksResetBtn(btn);

    if (error) {
      showToast(error.message, "error");
    } else {
      showToast("Reset link sent! Check your inbox.", "success");
      btn.disabled = true;
      btn.textContent = "Email sent ✓";
    }
  }

  async function updatePassword() {
    const newPwd = document.getElementById("newPassword").value;
    const confirmPwd = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("updateBtn");

    if (newPwd.length < 6) {
      showToast("Password must be at least 6 characters.", "warning");
      return;
    }
    if (newPwd !== confirmPwd) {
      showToast("Passwords do not match.", "warning");
      return;
    }

    ksSetBtnLoading(btn, "Updating…");

    const { error } = await supabaseClient.auth.updateUser({ password: newPwd });

    ksResetBtn(btn);

    if (error) {
      showToast(error.message, "error");
    } else {
      showToast("Password updated! Redirecting to login…", "success");
      const { data: { user } } = await supabaseClient.auth.getUser();
      const { data: profile } = user
        ? await supabaseClient.from("profiles").select("role").eq("id", user.id).single()
        : { data: null };
      const dest = profile?.role === "worker" ? "login-worker.html" : "login-farmer.html";
      setTimeout(() => window.location.href = dest, 2000);
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
